name: Daily Intel Report Generator

on:
  schedule:
    - cron: '0 6 * * *' # Runs daily at 06:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Daily Report Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python daily_report_generator.py

    - name: Commit & Push Updated Reports
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add daily_report.json rxbenefits_intel_hub_report.xlsx
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily intel report" && git push)
